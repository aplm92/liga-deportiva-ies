<div class="container my-5">
  <h1 class="mb-4">Crear Jugador</h1>

  <form (ngSubmit)="crearJugador()">

    <div class="mb-3">
      <label class="form-label">Nombre</label>
      <input name="nombre" class="form-control" [(ngModel)]="jugador.nombre">
    </div>

    <div class="mb-3">
      <label class="form-label">Posición</label>
      <input name="posicion" class="form-control" [(ngModel)]="jugador.posicion">
    </div>

    <div class="mb-3">
      <label class="form-label">Número</label>
      <input name="numero" type="number" class="form-control" [(ngModel)]="jugador.numero">
    </div>

    <div class="mb-3">
      <label class="form-label">Equipo</label>
      <input name="equipo" class="form-control" [(ngModel)]="jugador.equipo">
    </div>

    <div class="mb-3">
      <label class="form-label">Competición</label>
      <input name="competicion" class="form-control" [(ngModel)]="jugador.competicion">
    </div>

    <div class="mb-3">
      <label class="form-label">Edad</label>
      <input name="edad" type="number" class="form-control" [(ngModel)]="jugador.edad">
    </div>

    <div class="mb-3">
      <label class="form-label">Partidos Jugados</label>
      <input name="partidosJugados" type="number" class="form-control" [(ngModel)]="jugador.partidosJugados">
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input name="email" type="email" class="form-control" [(ngModel)]="jugador.email">
    </div>

    <button type="submit" class="btn btn-primary">Crear</button>
  </form>
</div>
