<div class="container mt-4">

  <h2>Árbitros</h2>

  <div class="row">
    <div class="col-md-4 mb-3" *ngFor="let a of arbitros">

      <div class="card p-3">
        <h5>{{ a.nombre }}</h5>
        <p><strong>Email:</strong> {{ a.email }}</p>
        <p><strong>Categoría:</strong> {{ a.categoria }}</p>

        <button class="btn btn-primary" (click)="mostrarDetalle(a)">
          Ver detalle
        </button>
      </div>

    </div>
  </div>

</div>
