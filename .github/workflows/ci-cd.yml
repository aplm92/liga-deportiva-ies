name: CI/CD - Liga Deportiva

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # -------------------------
  # ANGULAR TESTS
  # -------------------------
  angular-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Angular tests
        run: |
          cd frontend
          npm test -- --watch=false

  # -------------------------
  # LARAVEL TESTS
  # -------------------------
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, pdo, sqlite, pdo_sqlite

      - name: Install Composer dependencies
        run: |
          cd backend
          composer install --no-interaction --prefer-dist

      - name: Setup environment
        run: |
          cd backend
          cp .env.example .env || true
          php artisan key:generate

      - name: Prepare SQLite database
        run: |
          cd backend
          touch database/database.sqlite
          php artisan migrate --force

      - name: Run Laravel tests
        run: |
          cd backend
          ./vendor/bin/phpunit --configuration phpunit.xml

  # -------------------------
  # DEPLOY TO RENDER (ONLY IF TESTS PASS)
  # -------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: [angular-tests, laravel-tests]   # <- solo se ejecuta si ambos jobs pasan
    if: github.ref == 'refs/heads/main'     # opcional: solo desplegar en main

    steps:
      - name: Trigger Render deploy - Frontend
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys \
            -d '{}'

      - name: Trigger Render deploy - Backend
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys \
            -d '{}'
