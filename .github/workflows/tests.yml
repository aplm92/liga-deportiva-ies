name: CI Testing Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # -------------------------
  # ANGULAR TESTS
  # -------------------------
  angular-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Angular dependencies
        run: |
          cd frontend
          npm install

      - name: Run Angular unit tests
        run: |
          cd frontend
          npm run test -- --watch=false --browsers=ChromeHeadless

  # -------------------------
  # LARAVEL TESTS
  # -------------------------
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, pdo, sqlite, pdo_sqlite

      - name: Install Composer dependencies
        run: |
          cd backend
          composer install --no-interaction --prefer-dist

      - name: Prepare SQLite database
        run: |
          cd backend
          touch database/database.sqlite
          php artisan migrate --force

      - name: Run Laravel tests
        run: |
          cd backend
          php artisan test

  # -------------------------
  # CYPRESS E2E TESTS
  # -------------------------
  cypress-tests:
    runs-on: ubuntu-latest
    needs: [angular-tests, laravel-tests]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Start Angular server
        run: |
          cd frontend
          npm start &
        env:
          CI: true

      - name: Install Cypress
        run: |
          cd frontend
          npm install cypress --save-dev

      - name: Run Cypress tests
        run: |
          cd frontend
          npx cypress run
